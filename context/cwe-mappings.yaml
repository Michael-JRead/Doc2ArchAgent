# CWE Mappings for Doc2ArchAgent Security Findings
# Copyright (c) 2026 Michael J. Read. All rights reserved.
# SPDX-License-Identifier: BUSL-1.1
#
# Maps architecture-level security finding categories to CWE identifiers.
# Used by @security-reviewer to enrich STRIDE analysis output.
#
# Sources:
#   - MITRE CWE: https://cwe.mitre.org/
#   - OWASP: https://owasp.org/www-community/vulnerabilities/
#   - Verified against CWE v4.14 (2024)

finding_categories:

  - id: unauthenticated-listener
    name: Unauthenticated Listener
    description: A component listener accepts requests without any authentication mechanism.
    cwe_id: CWE-306
    cwe_name: Missing Authentication for Critical Function
    cwe_url: https://cwe.mitre.org/data/definitions/306.html
    severity: high
    stride_category: spoofing

  - id: unencrypted-listener
    name: Unencrypted Listener
    description: A component listener does not use TLS encryption for data in transit.
    cwe_id: CWE-319
    cwe_name: Cleartext Transmission of Sensitive Information
    cwe_url: https://cwe.mitre.org/data/definitions/319.html
    severity: high
    stride_category: tampering

  - id: missing-authorization
    name: Missing Authorization
    description: A component listener does not enforce authorization checks.
    cwe_id: CWE-862
    cwe_name: Missing Authorization
    cwe_url: https://cwe.mitre.org/data/definitions/862.html
    severity: high
    stride_category: elevation_of_privilege

  - id: internet-exposed-listener
    name: Internet-Exposed Listener
    description: A component in an internet-routable zone exposes a listener without adequate controls.
    cwe_id: CWE-668
    cwe_name: Exposure of Resource to Wrong Sphere
    cwe_url: https://cwe.mitre.org/data/definitions/668.html
    severity: high
    stride_category: spoofing
    note: >
      CWE-668 is more precise than CWE-749 for network-level exposure.
      CWE-749 (Exposed Dangerous Method or Function) applies to API method exposure.

  - id: sensitive-data-external-flow
    name: External Sensitive Data Flow
    description: Confidential or restricted data flows to an external system.
    cwe_id: CWE-200
    cwe_name: Exposure of Sensitive Information to an Unauthorized Actor
    cwe_url: https://cwe.mitre.org/data/definitions/200.html
    severity: medium
    stride_category: information_disclosure

  - id: trust-boundary-controls-missing
    name: Unconfirmed Trust Boundary Controls
    description: Data crosses a trust boundary without verified access controls.
    cwe_id: CWE-284
    cwe_name: Improper Access Control
    cwe_url: https://cwe.mitre.org/data/definitions/284.html
    severity: medium
    stride_category: elevation_of_privilege
    note: >
      CWE-284 is a pillar-level CWE. For more specific findings, consider:
      CWE-923 (Improper Restriction of Communication Channel to Intended Endpoints)
      for network-level trust boundary issues.

  - id: weak-tls-version
    name: Weak TLS Version
    description: A listener uses TLS version below 1.2.
    cwe_id: CWE-326
    cwe_name: Inadequate Encryption Strength
    cwe_url: https://cwe.mitre.org/data/definitions/326.html
    severity: medium
    stride_category: tampering

  - id: missing-logging
    name: Missing Audit Logging
    description: A zone or component lacks logging infrastructure for repudiation defense.
    cwe_id: CWE-778
    cwe_name: Insufficient Logging
    cwe_url: https://cwe.mitre.org/data/definitions/778.html
    severity: medium
    stride_category: repudiation

  - id: missing-waf
    name: Missing WAF Protection
    description: An internet-routable zone lacks a Web Application Firewall.
    cwe_id: CWE-693
    cwe_name: Protection Mechanism Failure
    cwe_url: https://cwe.mitre.org/data/definitions/693.html
    severity: medium
    stride_category: denial_of_service

  - id: missing-rate-limiting
    name: Missing Rate Limiting
    description: An internet-facing listener has no rate limiting or throttling.
    cwe_id: CWE-770
    cwe_name: Allocation of Resources Without Limits or Throttling
    cwe_url: https://cwe.mitre.org/data/definitions/770.html
    severity: medium
    stride_category: denial_of_service

  # New CWE mappings for enriched schema fields

  - id: no-supply-chain-attestation
    name: No Supply Chain Attestation
    description: A component has no SLSA level or SBOM for dependency verification.
    cwe_id: CWE-1104
    cwe_name: Use of Unmaintained Third-Party Components
    cwe_url: https://cwe.mitre.org/data/definitions/1104.html
    severity: low
    stride_category: tampering

  - id: no-input-validation
    name: No Input Validation
    description: A data flow has no input validation, enabling injection attacks.
    cwe_id: CWE-20
    cwe_name: Improper Input Validation
    cwe_url: https://cwe.mitre.org/data/definitions/20.html
    severity: medium
    stride_category: tampering

  - id: external-vendor-no-assessment
    name: External Vendor Without Security Assessment
    description: A vendor or partner external system has no recorded security assessment.
    cwe_id: CWE-829
    cwe_name: Inclusion of Functionality from Untrusted Control Sphere
    cwe_url: https://cwe.mitre.org/data/definitions/829.html
    severity: low
    stride_category: spoofing

  - id: verbose-error-exposure
    name: Verbose Error Details Exposed
    description: A listener exposes detailed error messages or stack traces.
    cwe_id: CWE-209
    cwe_name: Generation of Error Message Containing Sensitive Information
    cwe_url: https://cwe.mitre.org/data/definitions/209.html
    severity: medium
    stride_category: information_disclosure

  - id: admin-interface-no-mfa
    name: Admin Interface Without MFA
    description: An administrative endpoint does not use multi-factor authentication.
    cwe_id: CWE-308
    cwe_name: Use of Single-factor Authentication
    cwe_url: https://cwe.mitre.org/data/definitions/308.html
    severity: high
    stride_category: spoofing

  - id: excessive-session-timeout
    name: Excessive Session Timeout
    description: A listener has a session timeout exceeding 8 hours.
    cwe_id: CWE-613
    cwe_name: Insufficient Session Expiration
    cwe_url: https://cwe.mitre.org/data/definitions/613.html
    severity: low
    stride_category: spoofing

  - id: wildcard-cors-authenticated
    name: Wildcard CORS on Authenticated Endpoint
    description: A listener with authentication has a wildcard CORS policy.
    cwe_id: CWE-346
    cwe_name: Origin Validation Error
    cwe_url: https://cwe.mitre.org/data/definitions/346.html
    severity: high
    stride_category: spoofing

  - id: unenforced-trust-boundary
    name: Unenforced Trust Boundary
    description: A trust boundary has no enforcement mechanism defined.
    cwe_id: CWE-284
    cwe_name: Improper Access Control
    cwe_url: https://cwe.mitre.org/data/definitions/284.html
    severity: medium
    stride_category: elevation_of_privilege

  - id: no-audit-logging
    name: Missing Audit Logging on Component
    description: A component handling sensitive data has no audit logging enabled.
    cwe_id: CWE-778
    cwe_name: Insufficient Logging
    cwe_url: https://cwe.mitre.org/data/definitions/778.html
    severity: medium
    stride_category: repudiation

  - id: pii-no-encryption-in-transit
    name: PII Data on Unencrypted Flow
    description: PII data is transmitted without TLS encryption.
    cwe_id: CWE-319
    cwe_name: Cleartext Transmission of Sensitive Information
    cwe_url: https://cwe.mitre.org/data/definitions/319.html
    severity: critical
    stride_category: information_disclosure

  - id: pci-data-no-masking
    name: PCI Data Without Masking
    description: PCI cardholder data is transmitted without masking or tokenization.
    cwe_id: CWE-200
    cwe_name: Exposure of Sensitive Information to an Unauthorized Actor
    cwe_url: https://cwe.mitre.org/data/definitions/200.html
    severity: high
    stride_category: information_disclosure
