# Doc2ArchAgent — Codified Threat Rules (YAML-Based Scripted Rules)
# Modeled after Threagile's rule pattern: each rule gets the full model
# and decides its own iteration strategy.
#
# These rules are deterministic — same input always produces same output.
# No LLM involvement. Executed by tools/threat-rules.py.
#
# Rule structure:
#   id:            Unique rule identifier (kebab-case)
#   title:         Human-readable title
#   description:   What this rule checks for
#   stride:        STRIDE category
#   cwe:           CWE identifier
#   cwe_name:      CWE short name
#   severity:      Default severity (critical, high, medium, low, info)
#   iterate_over:  What model elements to check (components, listeners, relationships, zones, containers, trust_boundaries)
#   conditions:    List of condition checks (all must be true to fire)
#   severity_overrides: Context-aware severity adjustments
#   false_positive_note: Guidance for users on when to accept this risk
#   remediation:   Recommended fix

rules:
  # ============================================================
  # AUTHENTICATION RULES
  # ============================================================

  - id: unauthenticated-listener
    title: Unauthenticated Listener
    description: >
      A listener accepts connections without any authentication mechanism.
      This allows any caller to access the component, risking unauthorized access.
    stride: spoofing
    cwe: 306
    cwe_name: Missing Authentication for Critical Function
    severity: high
    iterate_over: listeners
    conditions:
      - field: listener.authn_mechanism
        operator: equals
        value: "none"
    severity_overrides:
      - when: component.component_type in ["health_check", "metrics"]
        then: info
        reason: Health check and metrics endpoints typically do not require authentication
      - when: zone.trust equals "trusted" and zone.internet_routable equals false
        then: medium
        reason: Internal trusted zone reduces exploitation likelihood
      - when: data_classification in ["confidential", "restricted"]
        then: critical
        reason: Sensitive data accessible without authentication
    false_positive_note: >
      May be acceptable for health check endpoints, Kubernetes readiness probes,
      or internal service mesh endpoints with network-level controls.
    remediation: Add authentication (oauth2, mtls, jwt, or api_key) to the listener.

  - id: weak-authentication
    title: Weak Authentication Mechanism
    description: >
      A listener uses basic or password-only authentication, which is vulnerable
      to credential stuffing, brute force, and replay attacks.
    stride: spoofing
    cwe: 287
    cwe_name: Improper Authentication
    severity: medium
    iterate_over: listeners
    conditions:
      - field: listener.authn_mechanism
        operator: in
        value: ["basic", "password"]
    severity_overrides:
      - when: zone.internet_routable equals true
        then: high
        reason: Internet-facing endpoints with weak auth are easily attacked
      - when: component.multi_tenant equals true
        then: high
        reason: Multi-tenant systems require stronger authentication
    remediation: Upgrade to oauth2, oidc, mtls, or jwt authentication.

  - id: missing-authorization
    title: Missing Authorization
    description: >
      A listener has authentication but no authorization enforcement.
      Authenticated users can access any resource regardless of their role.
    stride: elevation_of_privilege
    cwe: 862
    cwe_name: Missing Authorization
    severity: medium
    iterate_over: listeners
    conditions:
      - field: listener.authn_mechanism
        operator: not_equals
        value: "none"
      - field: listener.authz_required
        operator: equals
        value: false
    severity_overrides:
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Sensitive data requires authorization controls
      - when: component.multi_tenant equals true
        then: critical
        reason: Multi-tenant without authz enables cross-tenant data access
    remediation: Enable authz_required and implement role-based access control.

  # ============================================================
  # ENCRYPTION RULES
  # ============================================================

  - id: unencrypted-listener
    title: Unencrypted Listener
    description: >
      A listener does not use TLS encryption, allowing data in transit to be
      intercepted via network sniffing or man-in-the-middle attacks.
    stride: information_disclosure
    cwe: 319
    cwe_name: Cleartext Transmission of Sensitive Information
    severity: medium
    iterate_over: listeners
    conditions:
      - field: listener.tls_enabled
        operator: equals
        value: false
    severity_overrides:
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Sensitive data must be encrypted in transit
      - when: zone.internet_routable equals true
        then: critical
        reason: Internet-facing cleartext traffic is trivially interceptable
      - when: zone.trust equals "trusted" and data_classification equals "public"
        then: info
        reason: Public data in trusted internal zone is low risk
    remediation: Enable TLS 1.2+ on the listener.

  - id: weak-tls-version
    title: Weak TLS Version
    description: >
      A listener uses TLS 1.0 or 1.1 which have known vulnerabilities
      (POODLE, BEAST). TLS 1.2 is the minimum recommended version.
    stride: information_disclosure
    cwe: 326
    cwe_name: Inadequate Encryption Strength
    severity: medium
    iterate_over: listeners
    conditions:
      - field: listener.tls_enabled
        operator: equals
        value: true
      - field: listener.tls_version_min
        operator: in
        value: ["1.0", "1.1"]
    severity_overrides:
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Sensitive data requires strong encryption
    remediation: Upgrade to TLS 1.2 minimum (TLS 1.3 recommended).

  - id: missing-encryption-at-rest
    title: Missing Encryption at Rest
    description: >
      A data-storing component has no at-rest encryption configured.
      Stored data can be compromised if physical media or backups are exposed.
    stride: information_disclosure
    cwe: 311
    cwe_name: Missing Encryption of Sensitive Data
    severity: medium
    iterate_over: components
    conditions:
      - field: component.component_type
        operator: in
        value: ["database", "cache", "other"]
      - field: component.encryption_at_rest
        operator: in
        value: ["none", null]
    severity_overrides:
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Sensitive stored data must be encrypted at rest
    remediation: Enable at-rest encryption (aes-256, platform_managed, or customer_managed).

  # ============================================================
  # NETWORK EXPOSURE RULES
  # ============================================================

  - id: internet-exposed-no-waf
    title: Internet-Exposed Without WAF
    description: >
      A component is deployed in an internet-routable zone without a
      WAF infrastructure resource in the same zone.
    stride: tampering
    cwe: 693
    cwe_name: Protection Mechanism Failure
    severity: medium
    iterate_over: components
    conditions:
      - field: zone.internet_routable
        operator: equals
        value: true
      - field: zone.has_waf
        operator: equals
        value: false
    severity_overrides:
      - when: component.component_type in ["api", "web_frontend", "service"]
        then: high
        reason: Web-facing components need WAF protection against OWASP Top 10
    remediation: Add a WAF infrastructure resource to the internet-facing zone.

  - id: internet-exposed-listener
    title: Internet-Exposed Listener
    description: >
      A component listener is reachable from the internet. This significantly
      increases the attack surface and exploitation likelihood.
    stride: elevation_of_privilege
    cwe: 668
    cwe_name: Exposure of Resource to Wrong Sphere
    severity: medium
    iterate_over: listeners
    conditions:
      - field: zone.internet_routable
        operator: equals
        value: true
    severity_overrides:
      - when: listener.authn_mechanism equals "none"
        then: critical
        reason: Unauthenticated internet-facing listener is critical risk
      - when: listener.tls_enabled equals false
        then: critical
        reason: Unencrypted internet-facing listener is critical risk
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Internet-exposed sensitive data increases impact
    false_positive_note: >
      Internet-facing listeners are expected for public APIs and web apps.
      This rule highlights them for awareness; severity depends on controls.
    remediation: Ensure strong authentication, TLS, and WAF for internet-facing listeners.

  - id: unguarded-datastore-access
    title: Unguarded Direct Datastore Access
    description: >
      A database or cache component receives connections from outside its
      trust zone without an intermediary API or proxy layer.
    stride: tampering
    cwe: 284
    cwe_name: Improper Access Control
    severity: high
    iterate_over: components
    conditions:
      - field: component.component_type
        operator: in
        value: ["database", "cache"]
      - field: has_cross_zone_incoming
        operator: equals
        value: true
    remediation: Route datastore access through an API tier or connection proxy.

  # ============================================================
  # AVAILABILITY RULES
  # ============================================================

  - id: dos-risk-cross-boundary
    title: DoS Risk Across Trust Boundary
    description: >
      A critical-availability component receives traffic from a different
      trust zone, making it vulnerable to volumetric DoS attacks.
    stride: denial_of_service
    cwe: 400
    cwe_name: Uncontrolled Resource Consumption
    severity: medium
    iterate_over: components
    conditions:
      - field: component.availability
        operator: in
        value: ["critical", "high"]
      - field: has_cross_zone_incoming
        operator: equals
        value: true
    severity_overrides:
      - when: component.availability equals "critical" and zone.internet_routable equals true
        then: high
        reason: Critical internet-facing component without rate limiting
    remediation: Add rate limiting, circuit breakers, or autoscaling for cross-boundary traffic.

  # ============================================================
  # DATA FLOW RULES
  # ============================================================

  - id: sensitive-data-unencrypted-flow
    title: Sensitive Data Over Unencrypted Flow
    description: >
      A data flow carrying confidential or restricted data uses an
      unencrypted listener, risking data exposure in transit.
    stride: information_disclosure
    cwe: 319
    cwe_name: Cleartext Transmission of Sensitive Information
    severity: high
    iterate_over: relationships
    conditions:
      - field: relationship.data_classification
        operator: in
        value: ["confidential", "restricted"]
      - field: target_listener.tls_enabled
        operator: equals
        value: false
    remediation: Enable TLS on the target listener or reclassify the data flow.

  - id: sensitive-data-no-auth-flow
    title: Sensitive Data Over Unauthenticated Flow
    description: >
      A data flow carrying confidential or restricted data targets a
      listener with no authentication, risking unauthorized data access.
    stride: spoofing
    cwe: 306
    cwe_name: Missing Authentication for Critical Function
    severity: high
    iterate_over: relationships
    conditions:
      - field: relationship.data_classification
        operator: in
        value: ["confidential", "restricted"]
      - field: target_listener.authn_mechanism
        operator: equals
        value: "none"
    remediation: Add authentication to the target listener.

  - id: cross-boundary-no-encryption
    title: Cross-Boundary Flow Without Encryption
    description: >
      A data flow crosses a trust boundary without TLS encryption,
      allowing interception at the network boundary.
    stride: information_disclosure
    cwe: 319
    cwe_name: Cleartext Transmission of Sensitive Information
    severity: high
    iterate_over: relationships
    conditions:
      - field: crosses_trust_boundary
        operator: equals
        value: true
      - field: target_listener.tls_enabled
        operator: equals
        value: false
    remediation: Enable TLS on all cross-boundary communication links.

  # ============================================================
  # INTEGRITY RULES
  # ============================================================

  - id: high-integrity-no-auth
    title: High-Integrity Component Without Authentication
    description: >
      A component with critical or high integrity requirements accepts
      unauthenticated connections, risking unauthorized data modification.
    stride: tampering
    cwe: 345
    cwe_name: Insufficient Verification of Data Authenticity
    severity: high
    iterate_over: listeners
    conditions:
      - field: component.integrity
        operator: in
        value: ["critical", "high"]
      - field: listener.authn_mechanism
        operator: equals
        value: "none"
    remediation: Add authentication to prevent unauthorized modification of high-integrity data.

  # ============================================================
  # MODEL QUALITY RULES
  # ============================================================

  - id: orphaned-component
    title: Orphaned Component
    description: >
      A component has no incoming or outgoing relationships. This may
      indicate an incomplete architecture model.
    stride: null
    cwe: null
    cwe_name: null
    severity: info
    iterate_over: components
    conditions:
      - field: relationship_count
        operator: equals
        value: 0
    false_positive_note: >
      Standalone batch processors or cron jobs may legitimately have no relationships.
    remediation: Add relationships or mark as out_of_scope if intentionally isolated.

  - id: missing-data-classification
    title: Missing Data Classification on Sensitive Flow
    description: >
      A component relationship does not specify data_classification.
      Without classification, threat rules cannot assess data sensitivity.
    stride: null
    cwe: null
    cwe_name: null
    severity: info
    iterate_over: relationships
    conditions:
      - field: relationship.data_classification
        operator: in
        value: [null, ""]
    remediation: Add data_classification (public, internal, confidential, or restricted) to the relationship.

  # ============================================================
  # COMPLIANCE-ADJACENT RULES
  # ============================================================

  - id: missing-logging-zone
    title: Missing Logging Infrastructure in Zone
    description: >
      A network zone has no logging infrastructure resource, making
      it difficult to detect and investigate security incidents.
    stride: repudiation
    cwe: 778
    cwe_name: Insufficient Logging
    severity: medium
    iterate_over: zones
    conditions:
      - field: zone.has_logging
        operator: equals
        value: false
    severity_overrides:
      - when: zone.trust in ["untrusted", "semi_trusted"]
        then: high
        reason: Higher-risk zones require logging for incident response
    remediation: Add a logging infrastructure resource (SIEM, log aggregator) to the zone.

  - id: missing-monitoring-zone
    title: Missing Monitoring Infrastructure in Zone
    description: >
      A network zone has no monitoring infrastructure resource.
    stride: denial_of_service
    cwe: 778
    cwe_name: Insufficient Logging
    severity: low
    iterate_over: zones
    conditions:
      - field: zone.has_monitoring
        operator: equals
        value: false
    remediation: Add a monitoring infrastructure resource to the zone.

  # ============================================================
  # RATE LIMITING & DoS RULES (new — leverage rate_limiting_enabled)
  # ============================================================

  - id: no-rate-limiting
    title: No Rate Limiting on Internet-Exposed Listener
    description: >
      An internet-facing listener has no rate limiting configured.
      This makes it vulnerable to brute force, credential stuffing,
      and volumetric abuse. OWASP API Security Top 10 #4.
    stride: denial_of_service
    cwe: 770
    cwe_name: Allocation of Resources Without Limits or Throttling
    severity: medium
    iterate_over: listeners
    conditions:
      - field: zone.internet_routable
        operator: equals
        value: true
      - field: listener.rate_limiting_enabled
        operator: in
        value: [false, null]
    severity_overrides:
      - when: listener.authn_mechanism equals "none"
        then: high
        reason: Unauthenticated internet-facing endpoint without rate limiting enables mass abuse
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Sensitive data endpoints need protection from enumeration attacks
    remediation: Enable rate limiting (rate_limiting_enabled) with appropriate RPS limits and throttle_by dimension.

  # ============================================================
  # SUPPLY CHAIN RULES (new — leverage slsa_level, sbom_available)
  # ============================================================

  - id: no-supply-chain-attestation
    title: No Supply Chain Attestation
    description: >
      A component has no SLSA level or SBOM. Without supply chain
      attestation, compromised dependencies may go undetected.
      OWASP Top 10 2021 #A08 (Software and Data Integrity Failures).
    stride: tampering
    cwe: 1104
    cwe_name: Use of Unmaintained Third-Party Components
    severity: low
    iterate_over: components
    conditions:
      - field: component.slsa_level
        operator: in
        value: [null, 0]
      - field: component.sbom_available
        operator: in
        value: [false, null]
    severity_overrides:
      - when: data_classification in ["confidential", "restricted"]
        then: medium
        reason: Components handling sensitive data need supply chain verification
      - when: zone.internet_routable equals true
        then: medium
        reason: Internet-facing components are higher-value targets for supply chain attacks
    false_positive_note: >
      May be acceptable for legacy components with no active development
      or internally-built components with other verification processes.
    remediation: Generate an SBOM (CycloneDX or SPDX format) and target SLSA Level 2+.

  # ============================================================
  # CONFIDENTIALITY RULES (new — leverage confidentiality field)
  # ============================================================

  - id: high-confidentiality-no-encryption
    title: High-Confidentiality Component Without Encryption at Rest
    description: >
      A component with critical or high confidentiality requirements
      has no encryption at rest configured. Stored data may be exposed
      if storage media or backups are compromised.
    stride: information_disclosure
    cwe: 311
    cwe_name: Missing Encryption of Sensitive Data
    severity: high
    iterate_over: components
    conditions:
      - field: component.confidentiality
        operator: in
        value: ["critical", "high"]
      - field: component.encryption_at_rest
        operator: in
        value: ["none", null]
    severity_overrides:
      - when: component.stores_data equals true
        then: critical
        reason: Data-storing component with high confidentiality and no encryption is critical
    remediation: Enable encryption at rest (aes-256, platform_managed, or customer_managed) and configure key management.

  # ============================================================
  # INPUT VALIDATION RULES (new — leverage input_validation)
  # ============================================================

  - id: no-input-validation
    title: No Input Validation on Data Flow
    description: >
      A data flow has no input validation configured. Without validation,
      the target component is vulnerable to injection attacks (SQLi, XSS,
      command injection). OWASP Top 10 2021 #A03.
    stride: tampering
    cwe: 20
    cwe_name: Improper Input Validation
    severity: medium
    iterate_over: relationships
    conditions:
      - field: relationship.input_validation
        operator: in
        value: ["none", null]
    severity_overrides:
      - when: data_classification in ["confidential", "restricted"]
        then: high
        reason: Flows carrying sensitive data need input validation to prevent injection
      - when: crosses_trust_boundary equals true
        then: high
        reason: Cross-boundary flows without validation enable boundary bypass attacks
    remediation: Add input validation (schema, allowlist, or waf) on the receiving component.

  # ============================================================
  # EXTERNAL SYSTEM RULES (new — leverage trust_level, vendor assessment)
  # ============================================================

  - id: untrusted-external-no-tls
    title: Untrusted External System Without TLS
    description: >
      An external system with untrusted or unspecified trust level
      does not require TLS for communication. Data exchanged with
      this system may be intercepted.
    stride: information_disclosure
    cwe: 319
    cwe_name: Cleartext Transmission of Sensitive Information
    severity: high
    iterate_over: external_systems
    conditions:
      - field: external_system.tls_required
        operator: in
        value: [false, null]
      - field: external_system.trust_level
        operator: in
        value: ["untrusted", "semi_trusted", null]
    severity_overrides:
      - when: external_system.data_classification in ["confidential", "restricted"]
        then: critical
        reason: Sensitive data sent to external system without TLS
    remediation: Require TLS (tls_required=true) for all external system communication.

  - id: external-vendor-no-assessment
    title: External Vendor Without Security Assessment
    description: >
      A vendor or partner external system has no recorded security
      assessment. Third-party risk management requires periodic
      vendor security reviews.
    stride: spoofing
    cwe: 829
    cwe_name: Inclusion of Functionality from Untrusted Control Sphere
    severity: low
    iterate_over: external_systems
    conditions:
      - field: external_system.category
        operator: in
        value: ["vendor", "partner", "saas"]
      - field: external_system.vendor_security_assessed
        operator: in
        value: [false, null]
    severity_overrides:
      - when: external_system.data_classification in ["confidential", "restricted"]
        then: medium
        reason: Vendors handling sensitive data require formal security assessment
    false_positive_note: >
      May be acceptable for well-known, audited services (e.g., major cloud providers)
      where public compliance certifications serve as the assessment.
    remediation: Conduct a vendor security assessment and record the date.

  # ============================================================
  # DATA ENTITY COMPLIANCE RULES (new — leverage PII/PHI/PCI flags)
  # ============================================================

  - id: pii-no-encryption-in-transit
    title: PII Data Entity on Unencrypted Flow
    description: >
      A data entity containing PII is transmitted over a flow where
      the target listener does not have TLS enabled. GDPR Art 32.1
      requires appropriate technical measures including encryption.
    stride: information_disclosure
    cwe: 319
    cwe_name: Cleartext Transmission of Sensitive Information
    severity: critical
    iterate_over: relationships
    conditions:
      - field: relationship.data_entities_contain_pii
        operator: equals
        value: true
      - field: target_listener.tls_enabled
        operator: equals
        value: false
    remediation: Enable TLS on all flows carrying PII data.

  - id: pci-data-no-masking
    title: PCI Data Without Masking on Flow
    description: >
      A data entity containing PCI data (cardholder data, PANs)
      is transmitted without data masking. PCI-DSS Req 3.4 requires
      rendering PAN unreadable anywhere it is stored or displayed.
    stride: information_disclosure
    cwe: 200
    cwe_name: Exposure of Sensitive Information to Unauthorized Actor
    severity: high
    iterate_over: relationships
    conditions:
      - field: relationship.data_entities_contain_pci
        operator: equals
        value: true
      - field: relationship.data_masking
        operator: in
        value: [false, null]
    remediation: Enable data masking (data_masking=true) on flows carrying PCI data.

  # ============================================================
  # TRUST BOUNDARY ENFORCEMENT RULES (new)
  # ============================================================

  - id: unenforced-trust-boundary
    title: Unenforced Trust Boundary
    description: >
      A trust boundary has no enforcement mechanism defined. Without
      enforcement, the boundary is conceptual only and provides no
      actual security isolation.
    stride: elevation_of_privilege
    cwe: 284
    cwe_name: Improper Access Control
    severity: medium
    iterate_over: trust_boundaries
    conditions:
      - field: trust_boundary.enforcement_mechanism
        operator: in
        value: ["none", null]
    severity_overrides:
      - when: trust_boundary.boundary_type equals "network"
        then: high
        reason: Network boundaries without enforcement allow unrestricted lateral movement
    remediation: Define an enforcement mechanism (firewall, api_gateway, service_mesh, or iam_policy).

  # ============================================================
  # SESSION MANAGEMENT RULES (new)
  # ============================================================

  - id: excessive-session-timeout
    title: Excessive Session Timeout
    description: >
      A listener has a session timeout exceeding 480 minutes (8 hours).
      Long-lived sessions increase the window for session hijacking
      and credential theft.
    stride: spoofing
    cwe: 613
    cwe_name: Insufficient Session Expiration
    severity: low
    iterate_over: listeners
    conditions:
      - field: listener.session_timeout_minutes
        operator: greater_than
        value: 480
    severity_overrides:
      - when: zone.internet_routable equals true
        then: medium
        reason: Internet-facing endpoints with long sessions are higher risk
      - when: listener.admin_interface equals true
        then: high
        reason: Admin interfaces must have strict session timeouts
    remediation: Reduce session timeout to 480 minutes or less (30 minutes recommended for admin interfaces).

  # ============================================================
  # ERROR EXPOSURE RULES (new)
  # ============================================================

  - id: verbose-error-exposure
    title: Verbose Error Details Exposed
    description: >
      A listener is configured to expose detailed error messages or
      stack traces. This leaks internal architecture, technology stack,
      and potential vulnerability information to attackers.
    stride: information_disclosure
    cwe: 209
    cwe_name: Generation of Error Message Containing Sensitive Information
    severity: medium
    iterate_over: listeners
    conditions:
      - field: listener.error_detail_exposure
        operator: in
        value: ["detailed", "stack_trace"]
    severity_overrides:
      - when: zone.internet_routable equals true
        then: high
        reason: Internet-facing endpoints must not expose internal error details
    remediation: Set error_detail_exposure to 'none' or 'generic' for production environments.

  # ============================================================
  # ADMIN INTERFACE RULES (new)
  # ============================================================

  - id: admin-interface-no-mfa
    title: Admin Interface Without MFA
    description: >
      An administrative endpoint does not use multi-factor authentication.
      Admin interfaces provide elevated access and must be protected
      with the strongest authentication. PCI-DSS Req 8.3.
    stride: spoofing
    cwe: 308
    cwe_name: Use of Single-factor Authentication
    severity: high
    iterate_over: listeners
    conditions:
      - field: listener.admin_interface
        operator: equals
        value: true
      - field: listener.authn_mechanism
        operator: not_in
        value: ["mfa", "mtls", "certificate"]
    severity_overrides:
      - when: zone.internet_routable equals true
        then: critical
        reason: Internet-facing admin interfaces without MFA are critical risk
    remediation: Upgrade admin interface authentication to MFA, mTLS, or certificate-based.

  # ============================================================
  # AUDIT LOGGING RULES (new — leverage audit_logging field)
  # ============================================================

  - id: no-audit-logging
    title: Missing Audit Logging on Component
    description: >
      A component that handles confidential or restricted data does not
      have audit logging enabled. Without audit trails, security
      incidents cannot be investigated. HIPAA §164.312(b), PCI-DSS Req 10.
    stride: repudiation
    cwe: 778
    cwe_name: Insufficient Logging
    severity: medium
    iterate_over: components
    conditions:
      - field: data_classification
        operator: in
        value: ["confidential", "restricted"]
      - field: component.audit_logging
        operator: in
        value: [false, null]
    severity_overrides:
      - when: component.processes_pii equals true
        then: high
        reason: Components processing PII must have audit trails for GDPR compliance
    remediation: Enable audit logging (audit_logging=true) and configure an audit_log_destination.

  # ============================================================
  # WILDCARD CORS RULES (new)
  # ============================================================

  - id: wildcard-cors-authenticated
    title: Wildcard CORS on Authenticated Endpoint
    description: >
      A listener with authentication has a wildcard CORS policy,
      allowing any origin to make authenticated cross-origin requests.
      This enables CSRF and credential theft from malicious sites.
    stride: spoofing
    cwe: 346
    cwe_name: Origin Validation Error
    severity: high
    iterate_over: listeners
    conditions:
      - field: listener.cors_policy
        operator: equals
        value: "wildcard"
      - field: listener.authn_mechanism
        operator: not_equals
        value: "none"
    remediation: Set cors_policy to 'restrictive' with an explicit allowlist of trusted origins.
