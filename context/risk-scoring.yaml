# Copyright (c) 2026 Michael J. Read. All rights reserved.
# SPDX-License-Identifier: BUSL-1.1
#
# Defines the risk quantification methodology used by @security-reviewer.
# Based on OWASP Risk Rating methodology and Threagile's severity model.
#
# Risk Score = Likelihood × Impact
# Both dimensions use a 1-4 scale, yielding scores from 1 (low) to 16 (critical).

methodology:
  name: "Doc2ArchAgent Risk Scoring v1.0"
  formula: "risk_score = likelihood × impact"
  max_score: 16

severity_levels:
  - level: critical
    score_range: [12, 16]
    color: "#DC3545"
    description: Immediate remediation required. Architecture is exploitable.
  - level: high
    score_range: [8, 11]
    color: "#FD7E14"
    description: Remediation required before production deployment.
  - level: medium
    score_range: [4, 7]
    color: "#FFC107"
    description: Should be addressed. Acceptable risk with documented justification.
  - level: low
    score_range: [1, 3]
    color: "#28A745"
    description: Informational. No immediate action required.

likelihood_factors:
  - value: 4
    label: frequent
    description: >
      Attack vector is publicly known, requires low skill, and the component
      is internet-facing with no access controls.
    indicators:
      - internet_routable zone
      - authn_mechanism is none
      - tls_enabled is false

  - value: 3
    label: likely
    description: >
      Attack vector is known, component is internet-facing but has partial controls.
    indicators:
      - internet_routable zone
      - authn_mechanism is not none
      - tls_version_min below 1.2

  - value: 2
    label: possible
    description: >
      Component is in a semi-trusted zone or has known architectural weaknesses.
    indicators:
      - semi_trusted zone
      - missing WAF in internet-routable zone
      - missing rate limiting

  - value: 1
    label: unlikely
    description: >
      Component is in a trusted zone with full access controls.
    indicators:
      - trusted zone
      - tls_enabled is true
      - authn_mechanism is mfa or certificate
      - authz_required is true

impact_factors:
  - value: 4
    label: critical
    description: >
      Compromise exposes restricted/confidential data, enables lateral movement
      to data tier, or affects compliance-critical systems.
    indicators:
      - data_classification is restricted
      - lateral_movement_to data tier
      - compliance_frameworks includes PCI-DSS or HIPAA

  - value: 3
    label: high
    description: >
      Compromise exposes confidential data or enables lateral movement
      to application tier.
    indicators:
      - data_classification is confidential
      - lateral_movement_to app tier
      - component has more than 5 relationships

  - value: 2
    label: medium
    description: >
      Compromise exposes internal data or affects non-critical services.
    indicators:
      - data_classification is internal
      - component in non-production deployment

  - value: 1
    label: low
    description: >
      Compromise affects only public data or isolated components with no
      lateral movement paths.
    indicators:
      - data_classification is public
      - orphaned component (no relationships)

# Risk finding output schema
finding_schema:
  fields:
    - name: finding_id
      type: string
      description: Unique identifier (e.g., FINDING-001)
    - name: stride_category
      type: string
      enum: [spoofing, tampering, repudiation, information_disclosure, denial_of_service, elevation_of_privilege]
    - name: cwe_id
      type: string
      description: CWE identifier from context/cwe-mappings.yaml
    - name: attack_techniques
      type: array
      description: MITRE ATT&CK technique IDs from context/stride-to-attack.yaml
    - name: likelihood
      type: integer
      range: [1, 4]
    - name: impact
      type: integer
      range: [1, 4]
    - name: risk_score
      type: integer
      range: [1, 16]
    - name: severity
      type: string
      enum: [critical, high, medium, low]
    - name: affected_entity
      type: string
      description: Entity ID of the affected component/container
    - name: description
      type: string
    - name: recommendation
      type: string
    - name: compliance_controls
      type: array
      description: Applicable compliance controls from context/compliance-mappings.yaml
    - name: risk_status
      type: string
      enum: [open, accepted, mitigated, transferred]
      default: open
    - name: mitigation
      type: string
      description: Description of mitigation applied (if mitigated)
    - name: risk_owner
      type: string
      description: Person or team responsible for this risk
    - name: due_date
      type: string
      description: ISO 8601 date for risk remediation deadline
