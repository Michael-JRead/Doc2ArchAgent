# Example networks.yaml — Shared Network Resources
# This file is generated by the @architect agent.
# Path: architecture/networks.yaml
# Shared across all systems in the architecture.
#
# Demonstrates security-enriched network zones with segmentation,
# access policies, and security controls for threat modeling.

network_zones:
  - id: internet
    name: Internet (Untrusted)
    zone_type: external
    internet_routable: true
    trust: untrusted
    description: Public internet zone
    segmentation_type: none
    egress_filtered: false
    ids_ips_enabled: false
    dlp_enabled: false
    default_deny: false

  - id: dmz
    name: DMZ
    zone_type: dmz
    internet_routable: true
    trust: semi_trusted
    description: Demilitarized zone for public-facing services
    segmentation_type: vpc
    egress_filtered: true
    ids_ips_enabled: true
    dlp_enabled: false
    default_deny: true
    allowed_ingress_zones:
      - internet
    allowed_egress_zones:
      - private-app-tier

  - id: private-app-tier
    name: Private Application Tier
    zone_type: private
    internet_routable: false
    trust: trusted
    description: Internal network for application services
    segmentation_type: vpc
    egress_filtered: true
    ids_ips_enabled: true
    dlp_enabled: false
    default_deny: true
    allowed_ingress_zones:
      - dmz
    allowed_egress_zones:
      - private-data-tier
      - management

  - id: private-data-tier
    name: Private Data Tier
    zone_type: private
    internet_routable: false
    trust: trusted
    description: Restricted network for databases and data stores
    segmentation_type: vpc
    egress_filtered: true
    ids_ips_enabled: true
    dlp_enabled: true
    default_deny: true
    allowed_ingress_zones:
      - private-app-tier
    allowed_egress_zones:
      - management

  - id: management
    name: Management Network
    zone_type: management
    internet_routable: false
    trust: trusted
    description: Network for monitoring, logging, and administration
    segmentation_type: vpc
    egress_filtered: true
    ids_ips_enabled: true
    dlp_enabled: false
    default_deny: true
    allowed_ingress_zones:
      - private-app-tier
      - private-data-tier

infrastructure_resources:
  - id: f5-waf
    name: F5 Web Application Firewall
    resource_type: waf
    technology: F5 BIG-IP ASM
    zone_id: dmz
    version: "16.1"
    high_availability: true
    compliance_certified: true

  - id: hashicorp-vault
    name: HashiCorp Vault
    resource_type: secrets_manager
    technology: HashiCorp Vault Enterprise
    zone_id: management
    version: "1.15"
    high_availability: true
    encryption_key_management: hsm
    compliance_certified: true

  - id: elk-stack
    name: ELK Logging Stack
    resource_type: logging
    technology: Elasticsearch / Logstash / Kibana
    zone_id: management
    version: "8.12"
    high_availability: true
    compliance_certified: false

  - id: palo-alto-ids
    name: Palo Alto IDS/IPS
    resource_type: ids_ips
    technology: Palo Alto Networks PA-5200
    zone_id: dmz
    version: "11.1"
    high_availability: true
    compliance_certified: true

  - id: prometheus-monitoring
    name: Prometheus Monitoring
    resource_type: monitoring
    technology: Prometheus / Grafana
    zone_id: management
    version: "2.50"
    high_availability: true
