deployment_metadata:
  id: prod-us-east
  name: Production US East (EXAMPLE)
  environment: production
  status: example
  description: EXAMPLE — Primary production deployment in US East region
  region: us-east-1
  cloud_provider: AWS
  data_residency_region: us-east
  data_residency_required: true
  multi_region: false
  failover_region: us-west-2
  shared_responsibility_model: iaas
  tenant_isolation: dedicated

zone_placements:
  - zone_id: dmz
    containers:
      - container_id: api-tier
        replicas: 3
        runtime_user: non_root
        read_only_filesystem: true
        resource_limits_set: true
        network_policy_enforced: true
        image_registry: ecr.us-east-1.amazonaws.com/payments
        image_tag: "3.2.1"
        image_digest: "sha256:abc123def456..."
        image_signed: true
        vulnerability_scan_date: "2026-03-28"
        components:
          - component_id: payment-api

  - zone_id: private-app-tier
    containers:
      - container_id: app-core
        replicas: 2
        runtime_user: non_root
        read_only_filesystem: true
        resource_limits_set: true
        network_policy_enforced: true
        image_registry: ecr.us-east-1.amazonaws.com/payments
        image_tag: "5.1.0"
        image_signed: true
        vulnerability_scan_date: "2026-03-28"

  - zone_id: private-data-tier
    containers:
      - container_id: data-tier
        replicas: 2
        runtime_user: non_root
        read_only_filesystem: false
        resource_limits_set: true
        network_policy_enforced: true
        image_registry: ecr.us-east-1.amazonaws.com/payments
        image_tag: "15.6"
        image_signed: true
        vulnerability_scan_date: "2026-03-20"
        components:
          - component_id: payment-db
