# Example system.yaml — Payment Processing Platform
# This file is generated by @architect or @doc-ingester.
# Path: architecture/<system-id>/system.yaml
#
# Demonstrates security-enriched YAML with fields that enable:
# - Automated STRIDE-per-element threat analysis
# - Compliance control validation (PCI-DSS, SOC2, GDPR, HIPAA)
# - Supply chain risk assessment
# - Blast radius and lateral movement analysis
# - Firewall ACL generation

metadata:
  name: Payment Processing Platform
  description: Handles card-present and card-not-present payment transactions
  owner: Platform Security Team
  status: active
  compliance_frameworks:
    - PCI-DSS
    - SOC2
    - GDPR
  business_criticality: mission_critical
  data_sensitivity_level: restricted
  threat_model_version: "2.0"
  last_review_date: "2026-03-15"
  reviewer: "Security Architecture Team"

# Layer 1 — Contexts
contexts:
  - id: payment-platform
    name: Payment Platform
    description: Core payment processing system
    internal: true

  - id: card-network
    name: Visa / Mastercard Network
    description: External card network for transaction authorization
    internal: false
    external_system_id: visa-mastercard

# Context Relationships
context_relationships:
  - id: payment-to-card-network
    source_context: payment-platform
    target_context: card-network
    label: "submits transactions to"
    bidirectional: false

# Layer 2 — Containers
containers:
  - id: api-tier
    name: API Tier
    context_id: payment-platform
    container_type: api_gateway
    technology: Kong Gateway
    description: Public-facing API gateway with rate limiting
    status: active
    owner: API Platform Team

  - id: app-core
    name: Application Core
    context_id: payment-platform
    container_type: application_server
    technology: Java / Spring Boot
    description: Business logic for payment processing
    status: active
    owner: Payments Engineering

  - id: data-tier
    name: Data Tier
    context_id: payment-platform
    container_type: database
    technology: PostgreSQL 15
    description: Persistent storage for transactions and accounts
    status: active
    owner: Database Engineering

# Container Relationships
container_relationships:
  - id: api-to-app
    source_container: api-tier
    target_container: app-core
    label: "routes requests to"
    synchronous: true
    data_classification: confidential

  - id: app-to-data
    source_container: app-core
    target_container: data-tier
    label: "reads/writes transaction data"
    synchronous: true
    data_classification: restricted

# Layer 3 — Components
components:
  - id: payment-api
    name: Payment API
    container_id: app-core
    component_type: api
    technology: Spring Boot 3.2
    platform: JVM 21
    resiliency: active-active
    multi_tenant: false
    confidentiality: high
    integrity: critical
    availability: critical
    dfd_element_type: process
    stores_data: false
    processes_pii: true
    audit_logging: true
    audit_log_destination: elk-stack
    slsa_level: 2
    sbom_available: true
    listeners:
      - id: payment-api-https
        protocol: HTTPS
        port: 8443
        tls_enabled: true
        tls_version_min: "1.3"
        tls_version_max: "1.3"
        cipher_suite_policy: modern
        forward_secrecy_required: true
        certificate_type: internal_ca
        mtls_mode: none
        tls_termination_point: self
        authn_mechanism: oauth2
        authz_required: true
        rate_limiting_enabled: true
        rate_limit_rps: 1000
        throttle_by: tenant
        exposure: partner
        api_type: rest
        admin_interface: false
        session_timeout_minutes: 30
        error_detail_exposure: generic
        cors_policy: restrictive

  - id: payment-db
    name: Payment Database
    container_id: data-tier
    component_type: database
    technology: PostgreSQL 15
    platform: Linux
    resiliency: primary-replica
    confidentiality: critical
    integrity: critical
    availability: critical
    dfd_element_type: data_store
    stores_data: true
    processes_pii: true
    encryption_at_rest: aes-256
    encryption_key_management: customer_managed
    secrets_manager_ref: hashicorp-vault
    audit_logging: true
    audit_log_destination: elk-stack
    rto_minutes: 15
    rpo_minutes: 5
    slsa_level: 1
    sbom_available: false
    listeners:
      - id: payment-db-pg
        protocol: PostgreSQL
        port: 5432
        tls_enabled: true
        tls_version_min: "1.2"
        cipher_suite_policy: intermediate
        forward_secrecy_required: true
        certificate_type: internal_ca
        mtls_mode: strict
        tls_termination_point: self
        authn_mechanism: certificate
        authz_required: true
        rate_limiting_enabled: false
        exposure: internal
        admin_interface: false
        error_detail_exposure: none

# Component Relationships
component_relationships:
  - id: api-to-db
    source_component: payment-api
    target_component: payment-db
    target_listener_ref: payment-db-pg
    label: "persists transactions"
    synchronous: true
    data_entities:
      - transaction-record
      - cardholder-data
    data_classification: restricted
    interaction_type: request_response
    mutual_authentication: true
    input_validation: schema
    replay_protection: false
    data_masking: true

# External Systems
external_systems:
  - id: visa-mastercard
    name: Visa / Mastercard Network
    description: Card network for payment authorization
    category: partner
    trust_level: semi_trusted
    data_classification: restricted
    authn_mechanism: mtls
    tls_required: true
    sla_tier: platinum
    vendor_security_assessed: true
    vendor_security_assessment_date: "2025-11-01"
    data_residency: US

# Data Entities
data_entities:
  - id: transaction-record
    name: Transaction Record
    description: Payment transaction with card details
    classification: restricted
    contains_pii: true
    contains_phi: false
    contains_pci: true
    data_subject_type: customer
    retention_days: 2555
    residency_requirements:
      - US
      - EU
    masking_required: true
    origin: user_input
    volume: high

  - id: cardholder-data
    name: Cardholder Data
    description: Primary Account Number (PAN), expiry date, CVV
    classification: restricted
    contains_pii: true
    contains_phi: false
    contains_pci: true
    data_subject_type: customer
    retention_days: 0
    masking_required: true
    origin: user_input
    volume: high

# Trust Boundaries
trust_boundaries:
  - id: internet-to-dmz
    name: Internet to DMZ
    description: Boundary between public internet and DMZ network
    source_zone: internet
    target_zone: dmz
    boundary_type: network
    enforcement_mechanism: firewall
    inspection_enabled: true
    bidirectional: true

  - id: dmz-to-app
    name: DMZ to Application Tier
    description: Boundary between DMZ and private application network
    source_zone: dmz
    target_zone: private-app-tier
    boundary_type: network
    enforcement_mechanism: firewall
    inspection_enabled: false
    bidirectional: false

  - id: app-to-data
    name: Application to Data Tier
    description: Boundary between application and data networks
    source_zone: private-app-tier
    target_zone: private-data-tier
    boundary_type: network
    enforcement_mechanism: firewall
    inspection_enabled: false
    bidirectional: false

# Accepted Risks
accepted_risks:
  - id: accept-no-replay-protection
    finding_pattern: no-replay-protection
    entity_id: api-to-db
    justification: "Internal database connections use certificate mTLS which provides sufficient replay protection at the transport layer."
    accepted_by: "Security Architecture Team"
    review_date: "2026-03-15"
    expires: "2027-03-15"
    compensating_controls: "mTLS with certificate rotation every 90 days"
    risk_score: 4
