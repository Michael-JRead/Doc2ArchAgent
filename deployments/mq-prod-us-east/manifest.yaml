# ===========================================================================
# EXAMPLE FILE — Included as a reference deployment composition.
# This is NOT a real production architecture. Modify or replace for your use.
# ===========================================================================
manifest:
  id: mq-prod-us-east
  name: MQ Production US East (EXAMPLE)
  description: >
    EXAMPLE — IBM MQ messaging infrastructure deployed in the US East production
    data center using the standard 3-tier network topology.
  is_example: true
  environment: production
  region: us-east-1
  status: example
  cloud_provider: on-prem

  network:
    pattern_ref: standard-3tier
    version: "1.0.0"
    id_prefix: prod

  products:
    - pattern_ref: ibm-mq
      version: "1.0.0"
      id_prefix: mq
      context_name: MQ Production Messaging

  placements:
    - container_ref: mq-mq-infrastructure
      zone_ref: prod-private-app-tier
      replicas: 2
      runtime_user: non_root
      read_only_filesystem: true
      resource_limits_set: true
      network_policy_enforced: true
      image_signed: true
