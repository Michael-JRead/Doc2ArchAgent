metadata:
  name: Full System
  description: Complete system with all entity types
  owner: Test Team
  status: active
  compliance_frameworks:
    - PCI-DSS

contexts:
  - id: main-ctx
    name: Main Context
    description: Primary context
    internal: true

  - id: ext-ctx
    name: External Context
    description: External-facing context
    internal: false

context_relationships:
  - id: ctx-to-ext
    source_context: main-ctx
    target_context: ext-ctx
    label: "calls"

  - id: ctx-self-ref
    source_context: main-ctx
    target_context: main-ctx
    label: "self-ref"

containers:
  - id: web-tier
    name: Web Tier
    context_id: main-ctx
    container_type: web_server
    technology: Nginx
    status: active

container_relationships:
  - id: web-to-web
    source_container: web-tier
    target_container: web-tier
    label: "loopback"

components:
  - id: api-service
    name: API Service
    container_id: web-tier
    component_type: api
    technology: Node.js
    listeners:
      - id: api-https
        protocol: HTTPS
        port: 443
        tls_enabled: true
        tls_version_min: "1.3"
        authn_mechanism: oauth2
        authz_required: true

  - id: cache-service
    name: Cache Service
    container_id: web-tier
    component_type: cache
    technology: Redis
    listeners:
      - id: cache-tcp
        protocol: TCP
        port: 6379
        tls_enabled: true
        authn_mechanism: password
        authz_required: true

component_relationships:
  - id: api-to-cache
    source_component: api-service
    target_component: cache-service
    target_listener_ref: cache-tcp
    label: "reads session data"
    data_classification: confidential

external_systems:
  - id: payment-gateway
    name: Stripe
    description: Payment processing
    category: partner

data_entities:
  - id: session-data
    name: Session Data
    description: User session tokens
    classification: confidential

trust_boundaries:
  - id: public-to-private
    name: Public to Private
    source_zone: dmz
    target_zone: private-app-tier
