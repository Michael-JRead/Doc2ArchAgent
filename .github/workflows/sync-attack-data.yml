name: Sync MITRE ATT&CK Data

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month, midnight UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Sync ATT&CK data
        run: python tools/sync-attack-data.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet context/attack-techniques.yaml 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync MITRE ATT&CK data ${{ github.run_id }}"
          branch: chore/sync-attack-data
          title: "chore: sync MITRE ATT&CK data"
          body: |
            Automated monthly sync of MITRE ATT&CK technique data.

            - Source: MITRE ATT&CK STIX repository
            - Updated file: `context/attack-techniques.yaml`

            Please review the diff before merging.
          add-paths: context/attack-techniques.yaml
          delete-branch: true
