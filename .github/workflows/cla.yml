# CLA Assistant — enforces Contributor License Agreement signing on pull requests.
# Contributors sign by posting "I have read the CLA Document and I hereby sign the CLA"
# as a comment on their PR. Signatures are stored in signatures/cla.json.

name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: |
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "main"
          allowlist: "dependabot[bot],github-actions[bot],renovate[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement (CLA)](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            **To sign**, please post the following comment on this PR:

            > I have read the CLA Document and I hereby sign the CLA

            The CLA grants the project maintainer rights to include your contribution under both the BSL 1.1 and commercial license terms. You retain copyright ownership of your work. You only need to sign once — it applies to all future contributions.
          lock-pullrequest-aftermerge: true
