name: Validate Architecture

on:
  push:
    branches: [main]
    paths:
      - 'architecture/**'
      - 'tools/**'
      - 'schemas/**'
      - 'patterns/**'
      - 'tests/**'
      - 'context/**'
      - 'deployments/**'
  pull_request:
    paths:
      - 'architecture/**'
      - 'tools/**'
      - 'schemas/**'
      - 'patterns/**'
      - 'tests/**'
      - 'context/**'
      - 'deployments/**'

jobs:
  validate:
    name: Validate Architecture YAML
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema pytest bandit pip-audit rapidfuzz beautifulsoup4 html2text python-docx

      - name: Run regression tests
        run: pytest tests/ -v --tb=short

      - name: SAST — Bandit security scan
        run: bandit -r tools/ -f json -o bandit-results.json --severity-level medium || true

      - name: Bandit summary
        if: always()
        run: |
          if [ -f bandit-results.json ]; then
            python3 -c "
          import json
          with open('bandit-results.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          if results:
              print(f'::warning::Bandit found {len(results)} issue(s):')
              for r in results:
                  print(f\"  {r['issue_severity']}: {r['issue_text']} ({r['filename']}:{r['line_number']})\")
          else:
              print('Bandit: No issues found')
          "
          fi

      - name: Dependency audit — pip-audit
        run: pip-audit --requirement tools/requirements.txt --output json --desc 2>/dev/null || true

      - name: Validate architecture files
        id: validate
        run: |
          # Find all system.yaml files and validate each
          EXIT_CODE=0
          SARIF_FILES=""
          for system_file in $(find architecture -name "system.yaml" 2>/dev/null); do
            echo "Validating: $system_file"
            python tools/validate.py "$system_file" --format table || EXIT_CODE=1
            python tools/validate.py "$system_file" --format sarif > "/tmp/sarif-$(echo $system_file | tr '/' '-').sarif"
            SARIF_FILES="$SARIF_FILES /tmp/sarif-$(echo $system_file | tr '/' '-').sarif"
          done

          # Validate pattern files
          if [ -d "patterns" ]; then
            echo "Validating patterns..."
            python tools/validate-patterns.py patterns/ --format table 2>/dev/null || true
          fi

          # Merge SARIF files into one (or create empty)
          python3 -c "
          import json, sys, glob

          merged = {
              '\$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
              'version': '2.1.0',
              'runs': []
          }
          for f in glob.glob('/tmp/sarif-*.sarif'):
              with open(f) as fh:
                  data = json.load(fh)
                  merged['runs'].extend(data.get('runs', []))

          if not merged['runs']:
              merged['runs'] = [{
                  'tool': {'driver': {'name': 'Doc2ArchAgent-Validate', 'rules': []}},
                  'results': []
              }]

          with open('results.sarif', 'w') as fh:
              json.dump(merged, fh, indent=2)
          "

          exit $EXIT_CODE

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: architecture-validation
